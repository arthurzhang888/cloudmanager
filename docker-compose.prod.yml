version: '3.8'

services:
  # Databases
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-cloudmanager}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-cloudmanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${TSDB_USER:-tsdb}
      POSTGRES_PASSWORD: ${TSDB_PASSWORD:-changeme}
      POSTGRES_DB: ${TSDB_NAME:-telemetry}
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - backend
    command: redis-server --appendonly yes

  nats:
    image: nats:2-alpine
    command: "-js -m 8222"
    volumes:
      - nats_data:/data/jetstream
    networks:
      - backend

  # Cloud Backend Services
  api-gateway:
    build:
      context: ./cloud-backend
      dockerfile: Dockerfile.gateway
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - TSDB_HOST=timescaledb
      - REDIS_HOST=redis
      - NATS_URL=nats://nats:4222
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8080:8080"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_started
      redis:
        condition: service_started
      nats:
        condition: service_started

  asset-service:
    build:
      context: ./cloud-backend
      dockerfile: Dockerfile.asset
    environment:
      - PORT=8081
      - DB_HOST=postgres
      - NATS_URL=nats://nats:4222
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  telemetry-service:
    build:
      context: ./cloud-backend
      dockerfile: Dockerfile.telemetry
    environment:
      - PORT=8082
      - TSDB_HOST=timescaledb
      - NATS_URL=nats://nats:4222
    networks:
      - backend
    depends_on:
      timescaledb:
        condition: service_started
      nats:
        condition: service_started

  # Web Console
  web-console:
    build:
      context: ./web-console
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - backend
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  nats_data:

networks:
  backend:
    driver: bridge
